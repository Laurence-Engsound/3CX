    <rect x="10" y="28" width="14" height="14" fill="#10A0A7"/><text x="32" y="40" font-size="11" fill="#1A2530">3CX 元件</text>
    <rect x="10" y="46" width="14" height="14" fill="#2C9889"/><text x="32" y="58" font-size="11" fill="#1A2530">VOXEN 元件</text>
