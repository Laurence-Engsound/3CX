  <text x="700" y="58" text-anchor="middle" font-size="13" font-style="italic" fill="#6B7B85">v1.0 · 2026-04-25 · Internal use only</text>

  <!-- 圖例 -->
  <g transform="translate(20, 80)">
    <rect x="0" y="0" width="180" height="105" rx="4" fill="#F8F9F8" stroke="#CCCCCC"/>
