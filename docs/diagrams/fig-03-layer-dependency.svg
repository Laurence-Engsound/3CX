    <path d="M 160 326 L 170 320" marker-end="url(#ld-event)"/>
  </g>

  <g transform="translate(360, 60)">
    <text x="75" y="14" text-anchor="middle" font-size="10" font-weight="600" fill="#78350F">Subscribers</text>

    <rect x="0" y="22" width="150" height="32" rx="4" fill="#FFFFFF" stroke="#D97706"/>
    <text x="75" y="42" text-anchor="middle" font-size="10" fill="#78350F">L6 Agent Desktop</text>

    <rect x="0" y="60" width="150" height="32" rx="4" fill="#FFFFFF" stroke="#D97706"/>
    <text x="75" y="80" text-anchor="middle" font-size="10" fill="#78350F">L6 Supervisor</text>

    <rect x="0" y="98" width="150" height="32" rx="4" fill="#FFFFFF" stroke="#D97706"/>
    <text x="75" y="118" text-anchor="middle" font-size="10" fill="#78350F">L4 AI Pipeline</text>

    <rect x="0" y="136" width="150" height="32" rx="4" fill="#FFFFFF" stroke="#D97706"/>
    <text x="75" y="156" text-anchor="middle" font-size="10" fill="#78350F">L2 Audit Service</text>

    <rect x="0" y="174" width="150" height="32" rx="4" fill="#FFFFFF" stroke="#D97706"/>
    <text x="75" y="194" text-anchor="middle" font-size="10" fill="#78350F">L1 CRM Writeback</text>

    <rect x="0" y="212" width="150" height="32" rx="4" fill="#FFFFFF" stroke="#D97706"/>
    <text x="75" y="232" text-anchor="middle" font-size="10" fill="#78350F">L6 KPI Dashboard</text>

    <rect x="0" y="250" width="150" height="32" rx="4" fill="#FFFFFF" stroke="#D97706"/>
    <text x="75" y="270" text-anchor="middle" font-size="10" fill="#78350F">SIEM (外部)</text>
  </g>

  <g stroke="#B45309" stroke-width="1.2" fill="none">
    <path d="M 350 142 L 360 98" marker-end="url(#ld-event)"/>
