</g>

<g transform="translate(548, 290)">
  <rect width="138" height="184" rx="6" fill="#FFF5F5" stroke="#9B2C2C" stroke-width="1.5"/>
  <text x="69" y="20" text-anchor="middle" font-size="10" font-weight="700" fill="#742A2A">禁止 Pattern</text>
  <text x="69" y="34" text-anchor="middle" font-size="8" fill="#9B2C2C">Forbidden by Lint</text>

  <rect x="6" y="44" width="126" height="38" rx="4" fill="#FFFFFF" stroke="#9B2C2C"/>
  <text x="69" y="58" text-anchor="middle" font-size="9" font-weight="700" fill="#9B2C2C">✗ L6 → L3</text>
  <text x="69" y="72" text-anchor="middle" font-size="8" fill="#742A2A">改走 L5 編排</text>

  <rect x="6" y="86" width="126" height="38" rx="4" fill="#FFFFFF" stroke="#9B2C2C"/>
  <text x="69" y="100" text-anchor="middle" font-size="9" font-weight="700" fill="#9B2C2C">✗ L6 → L1</text>
  <text x="69" y="114" text-anchor="middle" font-size="8" fill="#742A2A">UI 不碰整合</text>

  <rect x="6" y="128" width="126" height="38" rx="4" fill="#FFFFFF" stroke="#9B2C2C"/>
  <text x="69" y="142" text-anchor="middle" font-size="9" font-weight="700" fill="#9B2C2C">✗ L5 → L1</text>
  <text x="69" y="156" text-anchor="middle" font-size="8" fill="#742A2A">走 L3 或 L4</text>

  <text x="69" y="178" text-anchor="middle" font-size="7" fill="#9B2C2C" font-style="italic">CI Lint 自動阻擋</text>
</g>

<g transform="translate(700, 90)">
  <rect width="520" height="498" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="260" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#78350F">事件反向流  ·  Event-driven Reverse Flow</text>
  <text x="260" y="38" text-anchor="middle" font-size="10" fill="#92400E">透過 Event Bus，下層可通知上層（不是直接呼叫）</text>

  <rect x="170" y="60" width="180" height="400" rx="8" fill="#FED7AA" stroke="#C05621" stroke-width="2"/>
  <text x="260" y="85" text-anchor="middle" font-size="12" font-weight="700" fill="#7B341E">Event Bus</text>
  <text x="260" y="100" text-anchor="middle" font-size="9" fill="#7B341E">L5 Orchestration</text>
  <text x="260" y="116" text-anchor="middle" font-size="9" fill="#7B341E">Pub/Sub 樞紐</text>

  <line x1="180" y1="126" x2="340" y2="126" stroke="#C05621" stroke-width="0.8"/>

  <text x="260" y="146" text-anchor="middle" font-size="10" font-weight="700" fill="#7B341E">主要事件主題</text>
  <text x="260" y="166" text-anchor="middle" font-size="10" fill="#92400E">call.started</text>
  <text x="260" y="184" text-anchor="middle" font-size="10" fill="#92400E">call.ended</text>
  <text x="260" y="202" text-anchor="middle" font-size="10" fill="#92400E">agent.statusChanged</text>
  <text x="260" y="220" text-anchor="middle" font-size="10" fill="#92400E">ai.transcriptReady</text>
  <text x="260" y="238" text-anchor="middle" font-size="10" fill="#92400E">ai.summaryReady</text>
  <text x="260" y="256" text-anchor="middle" font-size="10" fill="#92400E">ai.sentimentAlert</text>
  <text x="260" y="274" text-anchor="middle" font-size="10" fill="#92400E">lead.commitDue</text>
  <text x="260" y="292" text-anchor="middle" font-size="10" fill="#92400E">audit.securityEvent</text>
  <text x="260" y="310" text-anchor="middle" font-size="10" fill="#92400E">recording.started</text>
  <text x="260" y="328" text-anchor="middle" font-size="10" fill="#92400E">recording.paused</text>
  <text x="260" y="346" text-anchor="middle" font-size="10" fill="#92400E">consent.declined</text>
  <text x="260" y="364" text-anchor="middle" font-size="10" fill="#92400E">config.changed</text>
  <text x="260" y="382" text-anchor="middle" font-size="10" fill="#92400E">dlq.queued</text>
  <text x="260" y="400" text-anchor="middle" font-size="10" fill="#92400E">... (詳附錄 C)</text>

  <g transform="translate(10, 60)">
    <text x="75" y="14" text-anchor="middle" font-size="10" font-weight="600" fill="#78350F">Publishers</text>

    <rect x="0" y="22" width="150" height="32" rx="4" fill="#FFFFFF" stroke="#D97706"/>
    <text x="75" y="42" text-anchor="middle" font-size="10" fill="#78350F">L1 PBX Adapter</text>

    <rect x="0" y="60" width="150" height="32" rx="4" fill="#FFFFFF" stroke="#D97706"/>
    <text x="75" y="80" text-anchor="middle" font-size="10" fill="#78350F">L3 Voice / Chat</text>

    <rect x="0" y="98" width="150" height="32" rx="4" fill="#FFFFFF" stroke="#D97706"/>
    <text x="75" y="118" text-anchor="middle" font-size="10" fill="#78350F">L3 Recording</text>

    <rect x="0" y="136" width="150" height="32" rx="4" fill="#FFFFFF" stroke="#D97706"/>
    <text x="75" y="156" text-anchor="middle" font-size="10" fill="#78350F">L4 AI Pipeline</text>

    <rect x="0" y="174" width="150" height="32" rx="4" fill="#FFFFFF" stroke="#D97706"/>
    <text x="75" y="194" text-anchor="middle" font-size="10" fill="#78350F">L2 Audit Service</text>

    <rect x="0" y="212" width="150" height="32" rx="4" fill="#FFFFFF" stroke="#D97706"/>
    <text x="75" y="232" text-anchor="middle" font-size="10" fill="#78350F">L5 Scheduler</text>

    <rect x="0" y="250" width="150" height="32" rx="4" fill="#FFFFFF" stroke="#D97706"/>
    <text x="75" y="270" text-anchor="middle" font-size="10" fill="#78350F">L6 Admin Portal</text>
  </g>

  <g stroke="#B45309" stroke-width="1.2" fill="none">
    <path d="M 160 98 L 170 142" marker-end="url(#ld-event)"/>
    <path d="M 160 136 L 170 170" marker-end="url(#ld-event)"/>
    <path d="M 160 174 L 170 200" marker-end="url(#ld-event)"/>
    <path d="M 160 212 L 170 228" marker-end="url(#ld-event)"/>
