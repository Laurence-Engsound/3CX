    <path d="M 350 258 L 360 250" marker-end="url(#ld-event)"/>
    <path d="M 350 290 L 360 288" marker-end="url(#ld-event)"/>
    <path d="M 350 320 L 360 326" marker-end="url(#ld-event)"/>
  </g>

  <text x="260" y="486" text-anchor="middle" font-size="10" font-style="italic" fill="#78350F">任何層可 publish；任何層可 subscribe；不形成直接耦合</text>
</g>

<g transform="translate(60, 700)">
  <rect width="1160" height="80" rx="8" fill="#FFF7ED" stroke="#C05621" stroke-width="2"/>
  <text x="20" y="24" font-size="13" font-weight="700" fill="#7B341E">③ AI Agent Cross-cutting Pattern  ·  AI Agent 跨層呼叫（C7 AI-Agent Native）</text>
  <text x="20" y="44" font-size="10" fill="#92400E">AI Agent 不受層級限制 — 透過 FM-L4-AGENT-TOOLS-GATEWAY 可呼叫任何層的 capability</text>
  <text x="20" y="60" font-size="10" fill="#92400E">L1（44 個 Adapter 包裝為 Tool）· L2（資料讀寫）· L3（通話 / 訊息）· L4（其他 AI 模組）· L5（編排）· L6（UI 觸發）</text>
  <text x="20" y="74" font-size="10" fill="#92400E">關鍵控制：每個 Agent 有獨立 identity + scope；高風險 Tool 呼叫需人類核准（HITL）</text>
</g>

<g stroke="#7B341E" stroke-width="1.8" fill="none" opacity="0.7">
  <path d="M 720 700 Q 760 600 540 488" marker-end="url(#ld-agent)"/>
  <path d="M 720 700 Q 760 540 540 388" marker-end="url(#ld-agent)"/>
  <path d="M 720 700 Q 760 480 540 288" marker-end="url(#ld-agent)"/>
  <path d="M 720 700 Q 780 360 540 188" marker-end="url(#ld-agent)"/>
  <path d="M 720 700 Q 800 240 540 88" marker-end="url(#ld-agent)"/>
</g>
<rect x="592" y="620" width="100" height="44" rx="6" fill="#FED7AA" stroke="#7B341E" stroke-width="1.5"/>
<text x="642" y="640" text-anchor="middle" font-size="11" fill="#7B341E" font-weight="700">Agent</text>
<text x="642" y="656" text-anchor="middle" font-size="11" fill="#7B341E" font-weight="700">可達任一層</text>

<g transform="translate(60, 810)">
  <text x="0" y="0" font-size="12" font-weight="700" fill="#2C5282">圖示說明</text>

  <line x1="0" y1="22" x2="40" y2="22" stroke="#276749" stroke-width="2" marker-end="url(#ld-allow)"/>
  <text x="50" y="26" font-size="10" fill="#4A5568">① 同步呼叫往下</text>

  <line x1="180" y1="22" x2="220" y2="22" stroke="#276749" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#ld-allow)"/>
  <text x="230" y="26" font-size="10" fill="#4A5568">允許跳層（需 ADR）</text>

  <line x1="380" y1="22" x2="420" y2="22" stroke="#9B2C2C" stroke-width="2" stroke-dasharray="4,3" marker-end="url(#ld-forbid)"/>
  <text x="430" y="26" font-size="10" fill="#4A5568">禁止</text>

  <line x1="510" y1="22" x2="550" y2="22" stroke="#B45309" stroke-width="1.5" marker-end="url(#ld-event)"/>
  <text x="560" y="26" font-size="10" fill="#4A5568">② 事件反向流（Bus）</text>

  <line x1="730" y1="22" x2="770" y2="22" stroke="#7B341E" stroke-width="2" marker-end="url(#ld-agent)"/>
  <text x="780" y="26" font-size="10" fill="#4A5568">③ AI Agent 跨層呼叫（C7）</text>

  <text x="0" y="56" font-size="11" font-weight="700" fill="#2C5282">三種 pattern 之間的關係</text>
  <text x="0" y="76" font-size="10" fill="#4A5568">① 一般業務邏輯：上層觸發下層，遵守單向依賴 — 由 CI lint 自動驗證</text>
  <text x="0" y="94" font-size="10" fill="#4A5568">② 即時通知：下層透過 Event Bus 通知上層，解耦發佈者與訂閱者</text>
  <text x="0" y="112" font-size="10" fill="#4A5568">③ AI Agent 任務：Agent 可從任一進入點開始，透過 Tools Gateway 跨層完成 goal</text>
  <text x="0" y="130" font-size="10" fill="#4A5568">    — Agent 受 C7 治理（identity / scope / HITL）但不受 ① 的層級限制</text>
  <text x="0" y="148" font-size="10" fill="#4A5568">    — Agent 行為仍寫稽核（C2）+ 受 Guardrail 監控（C1 + C2）</text>
</g>

<text x="1265" y="1042" text-anchor="end" font-size="9" fill="#A0AEC0" font-style="italic">VOXEN SRS v2.10  ·  Layer Dependency + AI Agent Pattern  ·  2026-04</text>

</svg>
