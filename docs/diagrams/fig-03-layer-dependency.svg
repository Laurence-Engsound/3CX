<svg viewBox="0 0 1280 1060" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Noto Sans CJK TC, Microsoft JhengHei, Arial, sans-serif">
<title>VOXEN Layer Dependency Rules + Agent Cross-cutting</title>
<desc>VOXEN 六層架構依賴方向、事件反向流、AI Agent 跨層呼叫三種 pattern</desc>

<defs>
  <marker id="ld-allow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0,0 L10,5 L0,10 z" fill="#276749"/>
  </marker>
  <marker id="ld-forbid" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0,0 L10,5 L0,10 z" fill="#9B2C2C"/>
  </marker>
  <marker id="ld-event" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0,0 L10,5 L0,10 z" fill="#B45309"/>
  </marker>
  <marker id="ld-agent" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
    <path d="M0,0 L10,5 L0,10 z" fill="#7B341E"/>
  </marker>
</defs>

<text x="640" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#1A202C">Layer Dependency Rules  ·  層級依賴規則（含 AI Agent 跨層 pattern）</text>
<text x="640" y="54" text-anchor="middle" font-size="12" fill="#4A5568">三種 pattern：① 同步呼叫往下 · ② 事件流往上 · ③ AI Agent 跨層呼叫（C7）</text>

<g transform="translate(60, 90)">
  <rect x="0" y="0" width="480" height="88" rx="6" fill="#EBF8FF" stroke="#2C5282" stroke-width="1.5"/>
  <text x="16" y="22" font-size="14" font-weight="700" fill="#1A365D">L6 Engagement</text>
  <text x="16" y="40" font-size="10" fill="#2C5282">UI 層：Agent Desktop · Supervisor · Self-service</text>
  <text x="16" y="56" font-size="10" fill="#2C5282">✓ 可直接呼叫 L5 · L4 · L2</text>
  <text x="16" y="72" font-size="10" fill="#9B2C2C">✗ 禁止直接呼叫 L3 / L1</text>

  <rect x="0" y="100" width="480" height="88" rx="6" fill="#D6EAFD" stroke="#2C5282" stroke-width="1.5"/>
  <text x="16" y="122" font-size="14" font-weight="700" fill="#1A365D">L5 Orchestration</text>
  <text x="16" y="140" font-size="10" fill="#2C5282">編排層：Routing / Flow / Rules / Campaign</text>
  <text x="16" y="156" font-size="10" fill="#2C5282">✓ 可呼叫 L4 · L3 · L2</text>
  <text x="16" y="172" font-size="10" fill="#9B2C2C">✗ 禁止直接呼叫 L1（走 L3 或 L4）</text>

  <rect x="0" y="200" width="480" height="88" rx="6" fill="#BEE3F8" stroke="#2C5282" stroke-width="1.5"/>
  <text x="16" y="222" font-size="14" font-weight="700" fill="#1A365D">L4 Intelligence</text>
  <text x="16" y="240" font-size="10" fill="#2C5282">智能層：STT · LLM · RAG · NBA · Forecast</text>
  <text x="16" y="256" font-size="10" fill="#2C5282">✓ 可呼叫 L2 · L1（AI Providers）</text>
  <text x="16" y="272" font-size="10" fill="#9B2C2C">✗ 不呼叫 L3 / L5 / L6（被動被呼叫）</text>

  <rect x="0" y="300" width="480" height="88" rx="6" fill="#A5D4F1" stroke="#2C5282" stroke-width="1.5"/>
  <text x="16" y="322" font-size="14" font-weight="700" fill="#1A365D">L3 Interaction Core</text>
  <text x="16" y="340" font-size="10" fill="#1A365D">互動核心：Voice · Chat · Email · Recording</text>
  <text x="16" y="356" font-size="10" fill="#1A365D">✓ 可呼叫 L2 · L1（PBX / Messaging）</text>
  <text x="16" y="372" font-size="10" fill="#9B2C2C">✗ 不呼叫 L4 / L5（被動被呼叫）</text>

  <rect x="0" y="400" width="480" height="88" rx="6" fill="#8EC6EA" stroke="#2C5282" stroke-width="1.5"/>
  <text x="16" y="422" font-size="14" font-weight="700" fill="#1A365D">L2 Data &amp; Identity</text>
  <text x="16" y="440" font-size="10" fill="#1A365D">資料基礎：C360 · KB · Audit · Identity</text>
  <text x="16" y="456" font-size="10" fill="#1A365D">✓ 可呼叫 L1（外部資料源）</text>
  <text x="16" y="472" font-size="10" fill="#9B2C2C">✗ 不呼叫 L3 以上任何層</text>

  <rect x="0" y="500" width="480" height="88" rx="6" fill="#76B6E1" stroke="#2C5282" stroke-width="1.5"/>
  <text x="16" y="522" font-size="14" font-weight="700" fill="#1A365D">L1 Integration</text>
  <text x="16" y="540" font-size="10" fill="#1A365D">整合層：PBX · CRM · AI · IDP · Messaging</text>
  <text x="16" y="556" font-size="10" fill="#1A365D">✓ 只與外部系統溝通</text>
  <text x="16" y="572" font-size="10" fill="#9B2C2C">✗ 絕不呼叫任何上層（leaf layer）</text>
</g>

