<title>VOXEN Platform Architecture</title>
<desc>VOXEN 六層 × 七橫切柱 × 四營運塊</desc>

<text x="640" y="38" text-anchor="middle" font-size="24" font-weight="700" fill="#1A202C">VOXEN Platform Architecture</text>
