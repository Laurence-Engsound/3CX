<svg viewBox="0 0 1280 920" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Noto Sans CJK TC, Microsoft JhengHei, Arial, sans-serif">
<title>VOXEN Event Bus Topology</title>
<desc>VOXEN 事件流拓樸（含 AI Agent 為 pub/sub）</desc>

<defs>
  <marker id="ev-pub" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0,0 L10,5 L0,10 z" fill="#C05621"/>
  </marker>
  <marker id="ev-sub" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
    <path d="M0,0 L10,5 L0,10 z" fill="#2C5282"/>
  </marker>
</defs>

<text x="640" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#1A202C">Event Bus Topology  ·  事件流拓樸</text>
<text x="640" y="54" text-anchor="middle" font-size="12" fill="#4A5568">七大主題 × 11 發佈者 × 10 訂閱者  ·  at-least-once 送達保證</text>

<g transform="translate(20, 90)">
  <rect width="220" height="544" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="110" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#78350F">📢 發佈者 Publishers</text>
  <text x="110" y="38" text-anchor="middle" font-size="9" fill="#92400E">產生事件的層 / 模組</text>

  <g font-size="10" fill="#78350F">
    <rect x="10" y="50" width="200" height="34" rx="4" fill="#FFFFFF" stroke="#D97706"/>
    <text x="18" y="68" font-weight="700">L1 PBX Adapter</text>
    <text x="18" y="80" font-size="9" fill="#92400E">call.* · media.*</text>

    <rect x="10" y="90" width="200" height="34" rx="4" fill="#FFFFFF" stroke="#D97706"/>
    <text x="18" y="108" font-weight="700">L1 CRM Adapter</text>
    <text x="18" y="120" font-size="9" fill="#92400E">crm.synced · crm.failed</text>

    <rect x="10" y="130" width="200" height="34" rx="4" fill="#FFFFFF" stroke="#D97706"/>
    <text x="18" y="148" font-weight="700">L1 Messaging Adapter</text>
    <text x="18" y="160" font-size="9" fill="#92400E">message.inbound · delivered</text>

    <rect x="10" y="170" width="200" height="34" rx="4" fill="#FFFFFF" stroke="#D97706"/>
    <text x="18" y="188" font-weight="700">L3 Voice Channel</text>
    <text x="18" y="200" font-size="9" fill="#92400E">call.connected · transferred</text>

    <rect x="10" y="210" width="200" height="34" rx="4" fill="#FFFFFF" stroke="#D97706"/>
    <text x="18" y="228" font-weight="700">L3 Recording Engine</text>
    <text x="18" y="240" font-size="9" fill="#92400E">recording.* · paused</text>

    <rect x="10" y="250" width="200" height="34" rx="4" fill="#FFFFFF" stroke="#D97706"/>
    <text x="18" y="268" font-weight="700">L4 AI Pipeline</text>
    <text x="18" y="280" font-size="9" fill="#92400E">ai.transcript · summary</text>

    <rect x="10" y="290" width="200" height="34" rx="4" fill="#FFFFFF" stroke="#D97706"/>
    <text x="18" y="308" font-weight="700">L5 Routing Engine</text>
    <text x="18" y="320" font-size="9" fill="#92400E">routing.decided · queue</text>

    <rect x="10" y="330" width="200" height="34" rx="4" fill="#FFFFFF" stroke="#D97706"/>
    <text x="18" y="348" font-weight="700">L5 Scheduler</text>
    <text x="18" y="360" font-size="9" fill="#92400E">callback.due · campaign</text>

    <rect x="10" y="370" width="200" height="34" rx="4" fill="#FFFFFF" stroke="#D97706"/>
    <text x="18" y="388" font-weight="700">L6 Agent Desktop</text>
    <text x="18" y="400" font-size="9" fill="#92400E">agent.statusChanged</text>

    <rect x="10" y="410" width="200" height="34" rx="4" fill="#FFFFFF" stroke="#D97706"/>
    <text x="18" y="428" font-weight="700">L6 Admin Portal</text>
    <text x="18" y="440" font-size="9" fill="#92400E">config.changed · user</text>

    <rect x="10" y="450" width="200" height="34" rx="4" fill="#FED7D7" stroke="#9B2C2C"/>
    <text x="18" y="468" font-weight="700" fill="#742A2A">All Layers → Audit</text>
    <text x="18" y="480" font-size="9" fill="#9B2C2C">audit.* (強制)</text>

    <rect x="10" y="490" width="200" height="38" rx="4" fill="#FED7AA" stroke="#C05621" stroke-width="1.5"/>
    <text x="18" y="508" font-weight="700" fill="#7B341E">L4 AI Agent Runtime ⭐</text>
    <text x="18" y="522" font-size="9" fill="#7B341E">agent.task.* · agent.tool.*</text>
  </g>
</g>

<g transform="translate(280, 90)">
  <rect width="700" height="500" rx="10" fill="#FED7AA" stroke="#C05621" stroke-width="2"/>
  <text x="350" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#7B341E">🚌 Event Bus  ·  FM-L5-EVENT</text>
  <text x="350" y="42" text-anchor="middle" font-size="10" fill="#92400E">Kafka / NATS / Redis Streams · 租戶隔離 · at-least-once</text>

  <g transform="translate(20, 60)">
    <rect width="320" height="80" rx="6" fill="#FFFFFF" stroke="#C05621" stroke-width="1"/>
    <text x="160" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#7B341E">① 通話生命週期 call.*</text>
    <text x="10" y="36" font-size="9" fill="#78350F">started · ringing · answered · hold</text>
    <text x="10" y="50" font-size="9" fill="#78350F">resumed · muted · transferred</text>
    <text x="10" y="64" font-size="9" fill="#78350F">conferenced · ended · abandoned</text>

    <rect x="340" y="0" width="320" height="80" rx="6" fill="#FFFFFF" stroke="#C05621" stroke-width="1"/>
    <text x="500" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#7B341E">② 座席活動 agent.*</text>
    <text x="350" y="36" font-size="9" fill="#78350F">loggedIn · loggedOut</text>
    <text x="350" y="50" font-size="9" fill="#78350F">statusChanged (ready/away/lunch)</text>
    <text x="350" y="64" font-size="9" fill="#78350F">acwStarted · acwSubmitted · break</text>
  </g>

  <g transform="translate(20, 150)">
    <rect width="320" height="80" rx="6" fill="#FFFFFF" stroke="#C05621" stroke-width="1"/>
    <text x="160" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#7B341E">③ AI 產物 ai.*</text>
    <text x="10" y="36" font-size="9" fill="#78350F">transcriptChunk · transcriptFinal</text>
    <text x="10" y="50" font-size="9" fill="#78350F">summaryReady · coachingSuggested</text>
    <text x="10" y="64" font-size="9" fill="#78350F">sentimentAlert · complianceViolation</text>

    <rect x="340" y="0" width="320" height="80" rx="6" fill="#FFFFFF" stroke="#C05621" stroke-width="1"/>
    <text x="500" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#7B341E">④ 名單與活動 lead.* / campaign.*</text>
    <text x="350" y="36" font-size="9" fill="#78350F">lead.ingested · assigned · skipped</text>
    <text x="350" y="50" font-size="9" fill="#78350F">lead.disposed · commitDue · missed</text>
    <text x="350" y="64" font-size="9" fill="#78350F">campaign.triggered · completed</text>
  </g>

  <g transform="translate(20, 240)">
    <rect width="320" height="80" rx="6" fill="#FFFFFF" stroke="#C05621" stroke-width="1"/>
    <text x="160" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#7B341E">⑤ 文字與客戶 message.* / customer.*</text>
    <text x="10" y="36" font-size="9" fill="#78350F">message.inbound · outbound</text>
    <text x="10" y="50" font-size="9" fill="#78350F">message.delivered · read</text>
    <text x="10" y="64" font-size="9" fill="#78350F">customer.identified · authenticated</text>

    <rect x="340" y="0" width="320" height="80" rx="6" fill="#FFFFFF" stroke="#C05621" stroke-width="1"/>
    <text x="500" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#7B341E">⑥ 錄音與合規 recording.* / consent.*</text>
    <text x="350" y="36" font-size="9" fill="#78350F">recording.started · paused · resumed</text>
    <text x="350" y="50" font-size="9" fill="#78350F">consent.granted · declined</text>
    <text x="350" y="64" font-size="9" fill="#78350F">legalHold.applied · released</text>
  </g>

  <g transform="translate(20, 330)">
    <rect width="660" height="80" rx="6" fill="#FED7D7" stroke="#9B2C2C" stroke-width="1.5"/>
    <text x="330" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#742A2A">⑦ 稽核 &amp; 系統 audit.* / system.*  （強制收集，保留 7 年）</text>
    <text x="10" y="36" font-size="9" fill="#742A2A">audit.authLogin · accessGranted · configChanged · dataAccessed</text>
    <text x="10" y="50" font-size="9" fill="#742A2A">audit.dsr.requested · dsr.completed · audit.pcipauseTriggered</text>
    <text x="10" y="64" font-size="9" fill="#742A2A">system.healthDegraded · errorCritical · queue.dlqEvent · ratelimit</text>
  </g>

  <g transform="translate(20, 420)">
    <rect width="660" height="60" rx="6" fill="#F7FAFC" stroke="#4A5568" stroke-width="1"/>
    <text x="330" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#2D3748">送達保證與 Schema 治理</text>
    <text x="10" y="36" font-size="9" fill="#4A5568">at-least-once 預設 · exactly-once (audit/billing) · ordered (per partition key)</text>
    <text x="10" y="50" font-size="9" fill="#4A5568">Schema Registry · Backward-compatible 變更 · breaking 須 RFC · PII 禁放事件內</text>
  </g>
</g>

<g transform="translate(1020, 90)">
  <rect width="240" height="544" rx="8" fill="#EBF8FF" stroke="#2C5282" stroke-width="1.5"/>
  <text x="120" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#1A365D">📥 訂閱者 Subscribers</text>
  <text x="120" y="38" text-anchor="middle" font-size="9" fill="#2C5282">消費事件驅動行為</text>

  <g font-size="10" fill="#1A365D">
    <rect x="10" y="50" width="220" height="34" rx="4" fill="#FFFFFF" stroke="#2C5282"/>
    <text x="18" y="68" font-weight="700">L6 Agent Desktop</text>
    <text x="18" y="80" font-size="9" fill="#2C5282">call.* · ai.* · agent.*</text>

    <rect x="10" y="90" width="220" height="34" rx="4" fill="#FFFFFF" stroke="#2C5282"/>
    <text x="18" y="108" font-weight="700">L6 Supervisor Console</text>
    <text x="18" y="120" font-size="9" fill="#2C5282">所有 call.* · agent.* · alert</text>

    <rect x="10" y="130" width="220" height="34" rx="4" fill="#FFFFFF" stroke="#2C5282"/>
    <text x="18" y="148" font-weight="700">L6 KPI / Wallboard</text>
    <text x="18" y="160" font-size="9" fill="#2C5282">queue.* · lead.* · status</text>

    <rect x="10" y="170" width="220" height="34" rx="4" fill="#FFFFFF" stroke="#2C5282"/>
    <text x="18" y="188" font-weight="700">L4 AI Pipeline</text>
    <text x="18" y="200" font-size="9" fill="#2C5282">call.answered → STT</text>

    <rect x="10" y="210" width="220" height="34" rx="4" fill="#FFFFFF" stroke="#2C5282"/>
    <text x="18" y="228" font-weight="700">L2 Audit Log Service</text>
    <text x="18" y="240" font-size="9" fill="#2C5282">audit.* · compliance</text>

    <rect x="10" y="250" width="220" height="34" rx="4" fill="#FFFFFF" stroke="#2C5282"/>
    <text x="18" y="268" font-weight="700">L2 C360 Aggregator</text>
    <text x="18" y="280" font-size="9" fill="#2C5282">ai.summary · disposed</text>

    <rect x="10" y="290" width="220" height="34" rx="4" fill="#FFFFFF" stroke="#2C5282"/>
    <text x="18" y="308" font-weight="700">L1 CRM Writeback</text>
    <text x="18" y="320" font-size="9" fill="#2C5282">lead.disposed → POST</text>

    <rect x="10" y="330" width="220" height="34" rx="4" fill="#FFFFFF" stroke="#2C5282"/>
    <text x="18" y="348" font-weight="700">L4 Speech Analytics</text>
    <text x="18" y="360" font-size="9" fill="#2C5282">call.ended → batch</text>

    <rect x="10" y="370" width="220" height="34" rx="4" fill="#FFFFFF" stroke="#2C5282"/>
    <text x="18" y="388" font-weight="700">SIEM (外部)</text>
    <text x="18" y="400" font-size="9" fill="#2C5282">audit.* · system.*</text>

    <rect x="10" y="410" width="220" height="34" rx="4" fill="#FFFFFF" stroke="#2C5282"/>
    <text x="18" y="428" font-weight="700">P2 Billing Meter</text>
    <text x="18" y="440" font-size="9" fill="#2C5282">call.* · ai.* → 計量</text>

    <rect x="10" y="450" width="220" height="34" rx="4" fill="#E9D8FD" stroke="#6B46C1"/>
    <text x="18" y="468" font-weight="700" fill="#44337A">Plugin Subscribers</text>
    <text x="18" y="480" font-size="9" fill="#6B46C1">Marketplace 擴充</text>

    <rect x="10" y="490" width="220" height="38" rx="4" fill="#FED7AA" stroke="#C05621" stroke-width="1.5"/>
    <text x="18" y="508" font-weight="700" fill="#7B341E">L4 AI Agent Runtime ⭐</text>
    <text x="18" y="522" font-size="9" fill="#7B341E">call.* · message.* → 觸發 Agent</text>
  </g>
</g>

<g stroke="#C05621" stroke-width="1" fill="none" opacity="0.5">
  <path d="M 240 130 L 280 200" marker-end="url(#ev-pub)"/>
  <path d="M 240 240 L 280 280" marker-end="url(#ev-pub)"/>
  <path d="M 240 350 L 280 320" marker-end="url(#ev-pub)"/>
</g>

<g stroke="#2C5282" stroke-width="1" fill="none" opacity="0.5">
  <path d="M 980 200 L 1020 130" marker-end="url(#ev-sub)"/>
  <path d="M 980 280 L 1020 240" marker-end="url(#ev-sub)"/>
  <path d="M 980 320 L 1020 350" marker-end="url(#ev-sub)"/>
</g>

<g transform="translate(20, 620)">
  <rect width="1240" height="220" rx="8" fill="#F7FAFC" stroke="#4A5568" stroke-width="1"/>
  <text x="620" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#2D3748">事件治理摘要  ·  Event Governance Summary</text>

  <g font-size="10" fill="#4A5568">
    <text x="20" y="48" font-weight="600" fill="#2D3748">⚙ 解耦：</text>
    <text x="100" y="48">發佈者不知誰訂閱 · 訂閱者不知誰發佈 · Bus 解耦所有層級</text>

    <text x="20" y="72" font-weight="600" fill="#2D3748">⚙ 隔離：</text>
    <text x="100" y="72">租戶隔離透過 topic partition 或 header-based filter（依資料敏感度）</text>

    <text x="20" y="96" font-weight="600" fill="#2D3748">⚙ 順序：</text>
    <text x="100" y="96">事件順序保證僅限同一 partition key（同一 call / lead / tenant）</text>

    <text x="20" y="120" font-weight="600" fill="#2D3748">⚙ 重放：</text>
    <text x="100" y="120">事件流可回放供除錯 / 稽核（7 天起）· 高合規事件獨立保留至 7 年</text>

    <text x="20" y="144" font-weight="600" fill="#2D3748">⚙ Schema：</text>
    <text x="100" y="144">Schema Registry 自動檢查 compatibility · breaking 變更須 RFC 流程</text>

    <text x="20" y="168" font-weight="600" fill="#2D3748">⚙ PII 政策：</text>
    <text x="120" y="168">事件中僅放 ID 類欄位 · 內容由訂閱者依權限自行解析</text>

    <text x="20" y="192" font-weight="600" fill="#2D3748">⚙ DLQ：</text>
    <text x="100" y="192">3 次失敗 → dlq topic + 告警 · 人工介入後可重新處理</text>
  </g>
</g>

<text x="1265" y="902" text-anchor="end" font-size="9" fill="#A0AEC0" font-style="italic">VOXEN SRS v2.8  ·  Event Bus Topology (含 Agent pub/sub)  ·  2026-04</text>

</svg>
