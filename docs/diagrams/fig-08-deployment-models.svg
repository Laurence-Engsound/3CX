    <text x="410" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#78350F">VOXEN Cloud（瑛聲維運）</text>

    <rect x="265" y="34" width="90" height="32" rx="4" fill="#FFFFFF" stroke="#D97706"/>
    <text x="310" y="54" text-anchor="middle" font-size="10" fill="#78350F">Tenant 1</text>

    <rect x="360" y="34" width="90" height="32" rx="4" fill="#FFFFFF" stroke="#D97706"/>
    <text x="405" y="54" text-anchor="middle" font-size="10" fill="#78350F">Tenant 2</text>

    <rect x="455" y="34" width="100" height="32" rx="4" fill="#FFFFFF" stroke="#D97706"/>
    <text x="505" y="54" text-anchor="middle" font-size="10" fill="#78350F">Tenant N...</text>

    <rect x="265" y="74" width="290" height="32" rx="4" fill="#FFFFFF" stroke="#D97706"/>
    <text x="410" y="94" text-anchor="middle" font-size="10" fill="#78350F">共享 AI / Storage / Analytics</text>

    <rect x="265" y="114" width="290" height="32" rx="4" fill="#DBEAFE" stroke="#2C5282"/>
