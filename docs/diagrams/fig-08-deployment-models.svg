    <text x="135" y="148" text-anchor="middle" font-size="9" fill="#2C5282" font-style="italic">✓ 金融個資不出境</text>

    <g stroke="#6B46C1" stroke-width="1.5" fill="none">
      <path d="M 270 70 L 300 70" marker-end="url(#dep-arr)"/>
      <path d="M 300 100 L 270 100" stroke-dasharray="4,3"/>
    </g>
    <text x="285" y="60" text-anchor="middle" font-size="9" fill="#6B46C1">去識別化</text>
    <text x="285" y="118" text-anchor="middle" font-size="9" fill="#6B46C1">結果回</text>

    <rect x="298" y="0" width="270" height="160" rx="8" fill="#FAF5FF" stroke="#6B46C1" stroke-width="1.5" stroke-dasharray="6,3"/>
