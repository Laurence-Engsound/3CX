    <text x="375" y="54" text-anchor="middle" font-size="11" font-weight="700" fill="#742A2A">Secure Server Zone</text>
    <text x="375" y="72" text-anchor="middle" font-size="10" fill="#9B2C2C">VOXEN 全棧 · PBX · Local LLM (GPU)</text>
    <text x="375" y="88" text-anchor="middle" font-size="10" fill="#9B2C2C">Local STT · Local Vector · KMS+HSM</text>
    <text x="375" y="104" text-anchor="middle" font-size="10" fill="#9B2C2C">Local SIEM · Backup</text>
