<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Noto Sans CJK TC, Microsoft JhengHei, Arial, sans-serif">
<title>VOXEN Deployment Models</title>
<desc>VOXEN 四種部署模型對照</desc>

<text x="640" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#1A202C">Deployment Models  ·  四種部署模型</text>
<text x="640" y="54" text-anchor="middle" font-size="12" fill="#4A5568">依客戶機密等級、合規要求、IT 成熟度選用</text>

<g transform="translate(20, 90)">
  <rect width="610" height="280" rx="10" fill="#FFFFFF" stroke="#2C5282" stroke-width="1.5"/>
  <rect width="610" height="44" rx="10" fill="#2C5282"/>
  <rect y="34" width="610" height="10" fill="#2C5282"/>
  <text x="20" y="20" font-size="14" font-weight="700" fill="#FFFFFF">方案 1  ·  全地端部署 On-premises</text>
  <text x="20" y="38" font-size="10" fill="#BEE3F8" font-style="italic">適用：金融 · 政府 · 軍警 · 高安醫療</text>

  <g transform="translate(20, 60)">
    <rect width="570" height="160" rx="8" fill="#F0F9FF" stroke="#2C5282" stroke-width="1.5" stroke-dasharray="6,3"/>
