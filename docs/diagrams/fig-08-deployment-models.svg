    <rect x="313" y="102" width="240" height="28" rx="4" fill="#E9D8FD" stroke="#6B46C1"/>
    <text x="433" y="121" text-anchor="middle" font-size="10" fill="#44337A">Platform Ops (P1-P4)</text>

    <text x="433" y="148" text-anchor="middle" font-size="9" fill="#44337A" font-style="italic">✓ 算力彈性</text>
  </g>

  <defs>
    <marker id="dep-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B46C1"/>
