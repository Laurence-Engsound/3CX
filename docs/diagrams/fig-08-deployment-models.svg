    <rect x="20" y="40" width="170" height="100" rx="6" fill="#EBF8FF" stroke="#2C5282" stroke-width="1"/>
    <text x="105" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#1A365D">Agent LAN</text>
    <text x="105" y="80" text-anchor="middle" font-size="10" fill="#2C5282">座席 PC × N</text>
    <text x="105" y="98" text-anchor="middle" font-size="10" fill="#2C5282">Supervisor / Admin</text>
    <text x="105" y="118" text-anchor="middle" font-size="9" fill="#4A5568">VLAN 10-12</text>

    <rect x="200" y="40" width="350" height="100" rx="6" fill="#EBF8FF" stroke="#2C5282" stroke-width="1"/>
    <text x="375" y="60" text-anchor="middle" font-size="11" font-weight="700" fill="#1A365D">Server LAN</text>
    <text x="375" y="80" text-anchor="middle" font-size="10" fill="#2C5282">VOXEN · PBX · Local LLM(GPU) · Vector DB</text>
    <text x="375" y="98" text-anchor="middle" font-size="10" fill="#2C5282">Recording · DB · SIEM · KMS/HSM</text>
    <text x="375" y="118" text-anchor="middle" font-size="9" fill="#4A5568">VLAN 30-42</text>
  </g>

  <g font-size="10" fill="#2D3748" transform="translate(20, 232)">
    <text x="0" y="0" font-weight="700" fill="#2C5282">特性：</text>
    <text x="0" y="18">✓ 0% 資料出境  ✓ 無雲端依賴  ✓ AI 用地端 LLM  ✓ 客戶 IT 維運</text>
    <text x="0" y="34">建置成本：高 · 合規風險：最低 · 適合：銀行 / 軍警 / 政府最高安</text>
  </g>
</g>

<g transform="translate(650, 90)">
